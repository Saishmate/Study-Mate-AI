kind = "web"
previewPath = "/"
title = "StudyMate AI"
version = "1.0.0"
id = "artifacts/studymate-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20945

[services.development]
run = "pnpm --filter @workspace/studymate-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/studymate-ai", "run", "build" ]
publicDir = "artifacts/studymate-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20945"
BASE_PATH = "/"
